{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Formación Profesional EC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ffffff;
            color:  #d7642f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto 16px;
        }
        h1 {
            font-size: 20px;
            color: #1a237e;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #666;
            font-size: 13px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #1a237e;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        button:hover { background: #283593; }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            border-left: 3px solid #c62828;
        }
        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #999;
        }
        button:hover {
            background:  #d7642f;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <img src="{% static 'logo.png' %}" alt="Logo Formación Profesional EC" class="logo-circle">
            <h1>Formación Profesional EC</h1>
            <div class="subtitle">Sistema de gestión académica</div>
        </div>

        {% if form.errors %}
            <div class="error">
                Usuario o contraseña incorrectos. Inténtalo de nuevo.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Usuario</label>
                <input type="text" name="username" id="id_username" autofocus required>
            </div>
            <div class="form-group">
                <label for="id_password">Contraseña</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            <button type="submit">Iniciar sesión</button>
        </form>
        

        <div class="footer">

            <a href=https://formacionprofessional.com/ target="_blank" style="color: #1a237e; text-decoration: none; margin-left: 8px;">www.formacionprofesional.ec</a><br><br>
            <a href="https://github.com/photogamer2015" target="_blank" style="color: #1a237e; text-decoration: none; margin-left: 8px;">Documentación</a>
        </div>
    </div>
</body>
</html>
