{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Formación Profesional EC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a237e 50%, #283593 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1), 0 20px 48px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-circle {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: #ffffff;
            object-fit: cover;
            padding: 4px;
            border: 3px solid #fdae11;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            margin: 0 auto 20px;
            display: block;
            transition: transform 0.3s ease;
        }

        .logo-circle:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 22px;
            color: #1a237e;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13.5px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            background: #f8fafc;
            color: #0f172a;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #1a237e;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(26, 35, 126, 0.25);
        }

        button:hover { 
            background: #d7642f;
            box-shadow: 0 6px 16px rgba(215, 100, 47, 0.3);
            transform: translateY(-1px);
        }
        
        button:active {
            transform: translateY(1px);
        }

        .error {
            background: #fef2f2;
            color: #991b1b;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            margin-bottom: 24px;
            border-left: 4px solid #ef4444;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 13px;
            font-weight: 500;
        }

        .footer a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s ease;
            display: inline-block;
            margin-bottom: 8px;
        }

        .footer a:hover {
            color: #d7642f;
        }
        
        .footer-divider {
            display: inline-block;
            margin: 0 8px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <img src="{% static 'logo.png' %}" alt="Logo Formación Profesional EC" class="logo-circle">
            <h1>Formación Profesional EC</h1>
            <div class="subtitle">Sistema de gestión académica</div>
        </div>

        {% if form.errors %}
            <div class="error">
                Usuario o contraseña incorrectos. Inténtalo de nuevo.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Usuario</label>
                <input type="text" name="username" id="id_username" placeholder="Ingresa tu usuario" autofocus required>
            </div>
            <div class="form-group">
                <label for="id_password">Contraseña</label>
                <input type="password" name="password" id="id_password" placeholder="••••••••" required>
            </div>
            <button type="submit">Iniciar sesión</button>
        </form>

        <div class="footer">
            <a href="https://formacionprofessional.com/" target="_blank">www.formacionprofesional.ec</a>
            <span class="footer-divider">•</span>
            <a href="https://github.com/photogamer2015" target="_blank">Documentación</a>
        </div>
    </div>
</body>
</html>
